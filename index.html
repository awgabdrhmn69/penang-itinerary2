                    cardsHTML += `
                        <div class="w-full flex-shrink-0 snap-center px-6 flex flex-col justify-center h-full">
                            <div class="bg-white rounded-2xl shadow-[0_10px_30px_rgba(0,0,0,0.04)] border border-slate-100 overflow-hidden flex flex-col">
                                
                                <div class="bg-slate-800 px-4 py-3 flex items-center justify-between text-white flex-shrink-0">
                                    <button onclick="moveCarousel(${dIndex}, -1)" class="w-8 h-8 rounded-full bg-slate-700/50 flex items-center justify-center active:scale-90 transition-transform"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                                    <span class="text-xs font-800 tracking-widest text-slate-300 uppercase">${item.time}</span>
                                    <button onclick="moveCarousel(${dIndex}, 1)" class="w-8 h-8 rounded-full bg-slate-700/50 flex items-center justify-center active:scale-90 transition-transform"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                                </div>

                                <div class="flex flex-col bg-white">
                                    ${visualsGridHTML}
                                </div>

                                <div class="bg-slate-50 border-b border-slate-100 px-4 py-2.5 flex items-start gap-2.5">
                                    <div class="mt-0.5 p-1 bg-blue-50 text-blue-600 rounded-md">
                                        <i data-lucide="navigation" class="w-3.5 h-3.5 transform rotate-45 stroke-[2.5]"></i>
                                    </div>
                                    <p class="text-[11px] font-semibold text-slate-600 leading-relaxed">${item.logistics}</p>
                                </div>

                                <div class="p-5 flex-1 flex flex-col justify-between bg-white min-h-[160px]">
                                    <div>
                                        <h3 class="text-lg font-bold text-slate-800 leading-snug mb-1">${item.title}</h3>
                                        <p class="text-xs text-slate-500 leading-relaxed font-medium">${item.desc}</p>
                                    </div>
                                    <div class="mt-4 pt-3 border-t border-slate-100 flex items-center justify-between">
                                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Est. Budget</span>
                                        <span class="text-xs font-800 text-emerald-600 bg-emerald-50 px-2.5 py-1 rounded-md">${item.cost}</span>
                                    </div>
                                </div>

                            </div>
                        </div>
                    `;
                });

                container.innerHTML = cardsHTML;
            });
        }

        // Render Extras Engine
        function renderExtras() {
            const container = document.getElementById('extras-list-container');
            let completeHTML = '';

            for (const [category, places] of Object.entries(extrasData)) {
                places.forEach(place => {
                    let badgeColor = "bg-slate-100 text-slate-700";
                    let iconNode = "bookmark";
                    if(category === "Non-Halal Food") { badgeColor = "bg-amber-50 text-amber-800 border-amber-100"; iconNode = "utensils"; }
                    if(category === "Halal Food") { badgeColor = "bg-emerald-50 text-emerald-800 border-emerald-100"; iconNode = "moon"; }
                    if(category === "Mixed Courts") { badgeColor = "bg-purple-50 text-purple-800 border-purple-100"; iconNode = "layers"; }
                    if(category === "Points of Interest") { badgeColor = "bg-blue-50 text-blue-800 border-blue-100"; iconNode = "map-pin"; }
                    if(category === "Nightlife") { badgeColor = "bg-pink-50 text-pink-800 border-pink-100"; iconNode = "glass-water"; }

                    completeHTML += `
                        <div class="extra-item bg-white p-4 rounded-xl border border-slate-100 shadow-sm flex items-start justify-between gap-4 transition-all duration-200 hover:translate-x-1" data-category="${category}">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                                    <h4 class="font-bold text-slate-800 text-sm leading-tight">${place.name}</h4>
                                    <span class="text-[9px] font-bold px-2 py-0.5 rounded-full border ${badgeColor}">${category}</span>
                                </div>
                                <p class="text-xs text-slate-500 font-medium leading-relaxed">${place.desc}</p>
                            </div>
                            <a href="https://www.google.com/maps/search/?api=1&query=[Location+Name]" target="_blank" class="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center text-slate-400 hover:bg-slate-100 hover:text-slate-600 transition-colors flex-shrink-0">
                                <i data-lucide="${iconNode}" class="w-4 h-4"></i>
                            </a>
                        </div>
                    `;
                });
            }
            container.innerHTML = completeHTML;
        }

        // Global Navigation Logic Engine
        function switchTab(tabIndex) {
            appState.activeTab = tabIndex;
            
            // Update Headers Text
            document.getElementById('view-title').innerText = viewTitles[tabIndex];

            // Tab Buttons UI Styling Update
            const buttons = document.querySelectorAll('.nav-tab-btn');
            buttons.forEach((btn, index) => {
                if (index === tabIndex) {
                    btn.classList.remove('text-slate-400', 'font-medium');
                    btn.classList.add('text-emerald-600', 'font-bold');
                    btn.querySelector('i').setAttribute('stroke-width', '2.5');
                } else {
                    btn.classList.remove('text-emerald-600', 'font-bold');
                    btn.classList.add('text-slate-400', 'font-medium');
                    btn.querySelector('i').setAttribute('stroke-width', '2');
                }
            });

            // Display Panes Layer Management
            const panes = document.querySelectorAll('.tab-pane');
            panes.forEach((pane, index) => {
                if (index === tabIndex) {
                    pane.classList.remove('opacity-0', 'pointer-events-none', 'z-0');
                    pane.classList.add('opacity-100', 'z-10');
                } else {
                    pane.classList.remove('opacity-100', 'z-10');
                    pane.classList.add('opacity-0', 'pointer-events-none', 'z-0');
                }
            });
            
            // Recalculate icon renderings
            lucide.createIcons();
        }

        // Carousel Arrow Navigation Controls
        function moveCarousel(dayIndex, direction) {
            const container = document.getElementById(`carousel-${dayIndex}`);
            const totalElements = itineraryData[dayIndex].items.length;
            
            let targetIndex = appState.carouselIndices[dayIndex] + direction;
            if (targetIndex < 0) targetIndex = 0;
            if (targetIndex >= totalElements) targetIndex = totalElements - 1;

            appState.carouselIndices[dayIndex] = targetIndex;
            
            const itemWidth = container.querySelector('.w-full').clientWidth;
            container.scrollTo({
                left: itemWidth * targetIndex,
                behavior: 'smooth'
            });
        }

        // Extras Live Filter Pills Logic
        function filterExtras(category) {
            // Update Filter Badges Highlight Styling
            const filterButtons = document.querySelectorAll('.extra-filter-btn');
            filterButtons.forEach(btn => {
                if(btn.innerText.includes(category) || (category === 'all' && btn.innerText === 'All')) {
                    btn.classList.remove('bg-white', 'text-slate-600', 'border', 'border-slate-200');
                    btn.classList.add('bg-emerald-600', 'text-white');
                } else {
                    btn.classList.remove('bg-emerald-600', 'text-white');
                    btn.classList.add('bg-white', 'text-slate-600', 'border', 'border-slate-200');
                }
            });

            // Toggle item block rendering
            const items = document.querySelectorAll('.extra-item');
            items.forEach(item => {
                if (category === 'all' || item.getAttribute('data-category') === category) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        // App Initialization Orchestrator
        window.addEventListener('DOMContentLoaded', () => {
            renderItineraries();
            renderExtras();
            switchTab(0);
            
            // Global custom listener to handle scroll snap state sync safely
            itineraryData.forEach((_, dIndex) => {
                const scrollContainer = document.getElementById(`carousel-${dIndex}`);
                scrollContainer.addEventListener('scroll', () => {
                    const width = scrollContainer.clientWidth;
                    if (width > 0) {
                        const calculatedIndex = Math.round(scrollContainer.scrollLeft / width);
                        appState.carouselIndices[dIndex] = calculatedIndex;
                    }
                });
            });
        });
    </script>
</body>
</html>
